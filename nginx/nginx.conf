# ================================================================
#  WISP System - Configuración Nginx (Reverse Proxy)
# ================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Optimizaciones generales
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Rate limiting: prevenir abuso de API
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

    # ── Upstream: servicios internos ─────────────────────────────
    upstream api_backend {
        server api-core:3000;
        keepalive 10;
    }

    upstream web_frontend {
        server web-ui:80;
    }

    # ── Servidor HTTP principal ───────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Redirigir a HTTPS si existe certificado (comentar si no tienes TLS)
        # return 301 https://$host$request_uri;

        # ── API Backend ──────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 30s;

            # CORS headers
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # ── Health check ─────────────────────────────────────────
        location /health {
            proxy_pass http://api_backend/health;
            access_log off;
        }

        # ── Frontend (React SPA) ─────────────────────────────────
        location / {
            proxy_pass         http://web_frontend/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;

            # React Router: redirigir 404 al index.html
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://web_frontend/;
        }
    }

    # ── Servidor HTTPS (opcional, requiere certificados en ./nginx/ssl/) ──
    # server {
    #     listen 443 ssl http2;
    #     server_name tu-dominio.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #
    #     include /etc/nginx/conf.d/locations.conf;
    # }
}

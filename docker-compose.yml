

# ==============================================================
#  WISP System - Docker Compose
#  Compatible: Windows 10/11/Server & Linux (Ubuntu/Debian)
# ==============================================================

networks:
  wisp-public:        # Frontend <-> API
    driver: bridge
  wisp-internal:      # API <-> DB (aislada del exterior)
    driver: bridge
    internal: true
  wisp-mikrotik:      # Worker <-> Mikrotik (opcional: puede ser WireGuard)
    driver: bridge

volumes:
  db-data:            # Persistencia de base de datos (NUNCA borrar)
    driver: local
  api-logs:
  plugin-data:

services:

  # ──────────────────────────────────────────────
  #  BASE DE DATOS  (MariaDB 10.11 LTS)
  # ──────────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: wisp-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE:      ${DB_NAME}
      MARIADB_USER:          ${DB_USER}
      MARIADB_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql                  # Datos persistentes
      - ./db/init:/docker-entrypoint-initdb.d   # Scripts iniciales (solo primera vez)
    networks:
      - wisp-internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  #  API CORE  (Node.js 20 + Express)
  # ──────────────────────────────────────────────
  api-core:
    build:
      context: ./api-core
      dockerfile: Dockerfile
    container_name: wisp-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:        ${NODE_ENV:-production}
      DB_HOST:         db
      DB_PORT:         3306
      DB_NAME:         ${DB_NAME}
      DB_USER:         ${DB_USER}
      DB_PASSWORD:     ${DB_PASSWORD}
      JWT_SECRET:      ${JWT_SECRET}
      API_PORT:        3000
      MIKROTIK_HOST:   ${MIKROTIK_HOST}
      MIKROTIK_USER:   ${MIKROTIK_USER}
      MIKROTIK_PASS:   ${MIKROTIK_PASS}
      MIKROTIK_PORT:   ${MIKROTIK_PORT:-8728}
      SMTP_HOST:       ${SMTP_HOST:-""}
      SMTP_PORT:       ${SMTP_PORT:-587}
      SMTP_USER:       ${SMTP_USER:-""}
      SMTP_PASS:       ${SMTP_PASS:-""}
    volumes:
      - api-logs:/app/logs
      - ./api-core/plugins:/app/plugins          # Hot-reload de plugins
    networks:
      - wisp-public
      - wisp-internal
      - wisp-mikrotik
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────
  #  MIKROTIK WORKER  (Node.js - tareas programadas)
  # ──────────────────────────────────────────────
  mikrotik-worker:
    build:
      context: ./mikrotik-worker
      dockerfile: Dockerfile
    container_name: wisp-mikrotik-worker
    restart: unless-stopped
    depends_on:
      api-core:
        condition: service_healthy
    environment:
      API_URL:          http://api-core:3000
      API_WORKER_KEY:   ${WORKER_SECRET_KEY}
      MIKROTIK_HOST:    ${MIKROTIK_HOST}
      MIKROTIK_USER:    ${MIKROTIK_USER}
      MIKROTIK_PASS:    ${MIKROTIK_PASS}
      MIKROTIK_PORT:    ${MIKROTIK_PORT:-8728}
      CHECK_INTERVAL:   ${BILLING_CHECK_INTERVAL:-3600}   # segundos
    networks:
      - wisp-mikrotik
      - wisp-internal
    volumes:
      - ./mikrotik-worker/plugins:/app/plugins

  # ──────────────────────────────────────────────
  #  WEB UI  (React + Vite, servido por Nginx)
  # ──────────────────────────────────────────────
  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-http://localhost/api}
    container_name: wisp-frontend
    restart: unless-stopped
    networks:
      - wisp-public

  # ──────────────────────────────────────────────
  #  NGINX REVERSE PROXY  (entry point único)
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: wisp-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro            # Certificados TLS opcionales
    depends_on:
      - web-ui
      - api-core
    networks:
      - wisp-public
